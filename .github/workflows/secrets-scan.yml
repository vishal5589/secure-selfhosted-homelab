name: secrets-scan

# Blue-team control C2: catch any committed secret before it can merge.
# Runs on every push and pull request, plus a weekly sweep of history.

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'   # weekly Monday 03:00 UTC full-history sweep
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan entire history, not just the latest commit

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Fails the build if any secret is detected.
